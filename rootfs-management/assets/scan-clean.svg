<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Clean and scan RootFS</title>
  <desc id="desc">A RootFS is cleaned, checked for secrets, and scanned before publishing.</desc>
  <rect width="900" height="620" rx="28" fill="#fffdf8"/>
  <rect x="110" y="105" width="320" height="390" rx="34" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
  <rect x="160" y="165" width="220" height="28" rx="14" fill="#2f6f9f" opacity=".18"/>
  <rect x="160" y="224" width="180" height="28" rx="14" fill="#2a8f82" opacity=".22"/>
  <rect x="160" y="283" width="210" height="28" rx="14" fill="#d49b39" opacity=".26"/>
  <path d="M160 376 L210 426 L332 316" fill="none" stroke="#2a8f82" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(540 118)">
    <circle cx="110" cy="110" r="94" fill="#2f6f9f"/>
    <path d="M80 112 L105 138 L152 80" fill="none" stroke="#fffdf8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="8" y="255" fill="#1d2a2f" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">preflight scan</text>
  </g>
  <g transform="translate(535 390)" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800">
    <rect width="250" height="94" rx="22" fill="#fff3dd" stroke="#edd8aa" stroke-width="4"/>
    <text x="36" y="39" font-size="22" fill="#1d2a2f">remove secrets</text>
    <text x="36" y="69" font-size="18" fill="#61717a" font-weight="600">publish software, not tokens</text>
  </g>
  <path d="M430 302 C482 302 500 244 548 230" fill="none" stroke="#2a8f82" stroke-width="8" stroke-linecap="round"/>
</svg>

