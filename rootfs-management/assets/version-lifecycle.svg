<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">RootFS version lifecycle</title>
  <desc id="desc">RootFS versions progress from draft to published, upgraded, and rollback-ready.</desc>
  <rect width="900" height="620" rx="28" fill="#fffdf8"/>
  <path d="M130 315 H760" fill="none" stroke="#dfeee7" stroke-width="42" stroke-linecap="round"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" text-anchor="middle">
    <g transform="translate(150 315)">
      <circle r="65" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
      <text y="-6" font-size="25" fill="#1d2a2f">draft</text>
      <text y="25" font-size="17" fill="#61717a" font-weight="600">test</text>
    </g>
    <g transform="translate(350 315)">
      <circle r="65" fill="#2f6f9f"/>
      <text y="-6" font-size="25" fill="#fffdf8">v1</text>
      <text y="25" font-size="17" fill="#dcebf4" font-weight="600">published</text>
    </g>
    <g transform="translate(550 315)">
      <circle r="65" fill="#2a8f82"/>
      <text y="-6" font-size="25" fill="#fffdf8">v2</text>
      <text y="25" font-size="17" fill="#dff4ef" font-weight="600">upgrade</text>
    </g>
    <g transform="translate(750 315)">
      <circle r="65" fill="#d49b39"/>
      <text y="-6" font-size="25" fill="#fffdf8">back</text>
      <text y="25" font-size="17" fill="#fff3dd" font-weight="600">rollback</text>
    </g>
  </g>
  <g stroke="#2a8f82" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M218 315 H280"/>
    <path d="M418 315 H480"/>
    <path d="M618 315 H680"/>
  </g>
  <text x="450" y="125" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="800" fill="#1d2a2f">small releases, easy rollback</text>
  <text x="450" y="505" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="27" fill="#61717a">Students and projects stay pinned until you choose to move them.</text>
</svg>

