<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Build environment</title>
  <desc id="desc">A terminal and package tools prepare software and data in a project.</desc>
  <rect width="900" height="620" rx="28" fill="#fffdf8"/>
  <rect x="78" y="80" width="480" height="330" rx="28" fill="#213139"/>
  <circle cx="120" cy="122" r="10" fill="#c66f62"/>
  <circle cx="152" cy="122" r="10" fill="#d49b39"/>
  <circle cx="184" cy="122" r="10" fill="#2a8f82"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="27" fill="#f8fbf9">
    <text x="120" y="180">$ sudo apt install</text>
    <text x="120" y="230">$ pip install</text>
    <text x="120" y="280">$ verify.py</text>
    <text x="120" y="330" fill="#9de0d2">environment ready</text>
  </g>
  <g transform="translate(620 110)">
    <rect width="210" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <text x="38" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800" fill="#1d2a2f">packages</text>
  </g>
  <g transform="translate(620 260)">
    <rect width="210" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <text x="58" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800" fill="#1d2a2f">data</text>
  </g>
  <g transform="translate(620 410)">
    <rect width="210" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <text x="54" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800" fill="#1d2a2f">Codex</text>
  </g>
  <g stroke="#2a8f82" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M558 180 H620"/>
    <path d="M558 285 H620"/>
    <path d="M558 350 C595 380 595 438 620 458"/>
  </g>
  <path d="M108 486 C270 438 410 530 558 488 C675 455 752 523 826 477" fill="none" stroke="#dfeee7" stroke-width="55" stroke-linecap="round"/>
