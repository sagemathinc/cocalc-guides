<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">RootFS storage model</title>
  <desc id="desc">Compressed deduplicated bucket storage restores to shared host cache and project overlays.</desc>
  <rect width="900" height="620" rx="28" fill="#fffdf8"/>
  <g transform="translate(86 110)">
    <rect width="210" height="150" rx="26" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <path d="M50 75 C50 42 160 42 160 75 V112 C160 143 50 143 50 112 Z" fill="#2f6f9f" opacity=".88"/>
    <ellipse cx="105" cy="75" rx="55" ry="24" fill="#5b93b9"/>
    <text x="105" y="196" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1d2a2f">bucket artifact</text>
  </g>
  <g transform="translate(345 95)">
    <rect width="210" height="180" rx="26" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <rect x="45" y="45" width="120" height="42" rx="14" fill="#2a8f82" opacity=".24"/>
    <rect x="45" y="98" width="120" height="42" rx="14" fill="#2a8f82" opacity=".38"/>
    <text x="105" y="224" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1d2a2f">host cache</text>
  </g>
  <g transform="translate(630 80)">
    <rect width="185" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <rect y="130" width="185" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <rect y="260" width="185" height="100" rx="22" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <text x="92" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="800" fill="#1d2a2f">project A</text>
    <text x="92" y="188" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="800" fill="#1d2a2f">project B</text>
    <text x="92" y="318" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="800" fill="#1d2a2f">project C</text>
  </g>
  <g stroke="#2a8f82" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M296 185 H345"/>
    <path d="M555 185 C590 140 605 130 630 130"/>
    <path d="M555 185 H630"/>
    <path d="M555 185 C590 230 605 260 630 310"/>
  </g>
  <text x="450" y="500" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800" fill="#1d2a2f">one shared base, separate writable project data</text>
  <text x="450" y="545" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="25" fill="#61717a">The base image is cacheable; ordinary project quota covers what users write.</text>
</svg>
