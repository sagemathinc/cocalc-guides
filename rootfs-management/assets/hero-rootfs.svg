<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">RootFS publishing workflow</title>
  <desc id="desc">A prepared project publishes a managed RootFS that many projects can reuse.</desc>
  <rect width="1200" height="675" rx="36" fill="#fff8ea"/>
  <path d="M105 480 C230 395 355 545 495 452 S735 285 936 345 S1120 282 1155 210" fill="none" stroke="#dfeee7" stroke-width="72" stroke-linecap="round"/>
  <g fill="#1d2a2f" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800">
    <text x="84" y="84" font-size="38">One project becomes</text>
    <text x="84" y="130" font-size="38">a reusable environment</text>
    <text x="98" y="190" font-size="22" fill="#61717a" font-weight="600">install -> verify -> scan -> publish -> reuse</text>
  </g>
  <g transform="translate(95 245)">
    <rect width="260" height="190" rx="24" fill="#ffffff" stroke="#d6e4df" stroke-width="5"/>
    <rect x="30" y="38" width="200" height="26" rx="13" fill="#2f6f9f" opacity=".18"/>
    <rect x="30" y="82" width="160" height="22" rx="11" fill="#2a8f82" opacity=".22"/>
    <rect x="30" y="122" width="185" height="22" rx="11" fill="#d49b39" opacity=".28"/>
    <text x="30" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#1d2a2f">Course project</text>
  </g>
  <path d="M380 340 H505" fill="none" stroke="#2a8f82" stroke-width="9" stroke-linecap="round"/>
  <path d="M485 318 L520 340 L485 362" fill="none" stroke="#2a8f82" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(525 215)">
    <rect width="230" height="250" rx="38" fill="#2f6f9f"/>
    <rect x="42" y="55" width="146" height="140" rx="20" fill="#fffdf8"/>
    <path d="M75 88 H156 M75 123 H176 M75 158 H141" stroke="#2f6f9f" stroke-width="14" stroke-linecap="round"/>
    <text x="42" y="225" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800" fill="#fffdf8">RootFS v1</text>
  </g>
  <path d="M782 340 H905" fill="none" stroke="#2a8f82" stroke-width="9" stroke-linecap="round"/>
  <path d="M885 318 L920 340 L885 362" fill="none" stroke="#2a8f82" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(915 220)" fill="#ffffff" stroke="#d6e4df" stroke-width="5">
    <rect width="95" height="95" rx="22"/>
    <rect x="120" y="25" width="95" height="95" rx="22"/>
    <rect x="24" y="120" width="95" height="95" rx="22"/>
    <rect x="145" y="145" width="95" height="95" rx="22"/>
  </g>
  <g fill="#2f6f9f" opacity=".75">
    <circle cx="962" cy="268" r="14"/>
    <circle cx="1082" cy="293" r="14"/>
    <circle cx="986" cy="388" r="14"/>
    <circle cx="1107" cy="413" r="14"/>
  </g>
  <text x="932" y="520" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800" fill="#1d2a2f">many projects</text>
</svg>
